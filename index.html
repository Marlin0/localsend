<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LocalSend 跨网网页 P2P 直连</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="screenshot-tip">提示：请在随后的弹出框内选择当前窗口或标签页完成截图</div>

<div id="audio-record-overlay">
    <div class="audio-record-box">
        <div class="audio-icon-anim">🎙️</div>
        <div id="audio-record-tip">正在录音...</div>
    </div>
</div>

<div class="container">
    <h2>LocalSend P2P 直连</h2>
    
    <div class="top-bar">
        <div id="status" class="status">请配置服务器并选择角色</div>
        <label class="online-toggle" id="online-toggle-container" style="display:none;">
            <input type="checkbox" id="allow-share-status" checked onchange="toggleStatusSharing()"> 允许对方看我在线
        </label>
    </div>
    
    <div id="role-zone" class="section" style="text-align: center; margin-top: 10px;">
        <p style="margin-top: 0; text-align: left; font-size: 14px; color: #666;">信令服务器地址：</p>
        <input type="text" id="server-url" value="ws://127.0.0.1:8765" placeholder="例如: ws://107.173.201.133:8765">
        <button onclick="chooseRole('sender')" style="background: #52c41a; margin-bottom: 10px;">我是发送方 (生成口令)</button>
        <button onclick="chooseRole('receiver')" style="background: #1677ff;">我是接收方 (输入口令)</button>
    </div>

    <div id="sender-panel" class="section" style="display: none;">
        <p style="text-align: center; margin: 0;">请将下方短口令告诉接收方：</p>
        <div id="generated-code" class="code-display">000000</div>
    </div>

    <div id="receiver-panel" class="section" style="display: none;">
        <p style="text-align: center; margin-top: 0;">请输入发送方屏幕上的 6 位口令：</p>
        <input type="text" id="input-code" placeholder="输入 6 位数字" maxlength="6" onkeypress="handleReceiverCodeKeyPress(event)">
        <button onclick="connectToRoom()" id="btn-connect-peer">联络发送方</button>
    </div>

    <div id="transfer-zone">
        <div id="msg-box"></div>
        
        <div class="input-panel">
            <div id="paste-preview-area">
                <div class="preview-left">
                    <img id="paste-preview-img" src="" alt="预览">
                    <span class="preview-text">图片已就绪，回车键发送</span>
                </div>
                <button class="remove-preview-btn" onclick="clearImagePreview()">取消</button>
            </div>

            <div class="input-area">
                <input type="text" id="msg-input" placeholder="输入消息或在此粘贴(Ctrl+V)图片..." onkeypress="handleKeyPress(event)" onpaste="handlePaste(event)">
                
                <button id="btn-audio-record" class="btn-audio-talk">🎤 按住 说话</button>
                
                <input type="file" id="file-input" style="display: none;" onchange="sendFile()">
                
                <button class="btn-action" id="btn-desktop-file" title="发送文件/图片" onclick="document.getElementById('file-input').click()">📁</button>
                <button class="btn-action btn-screenshot" id="btn-desktop-screenshot" title="屏幕截图并置入输入框" onclick="takeScreenshot()">✂️ 截图</button>
                <button class="btn-action btn-mobile-media" id="btn-mobile-chooser" title="拍照或选择照片" onclick="document.getElementById('file-input').click()">🖼️ 选图</button>
                
                <button onclick="sendMessage()" id="btn-send-text">发送</button>
            </div>
        </div>
    </div>
</div>

<div id="lightbox">
    <div class="lightbox-wrapper" id="lightbox-wrapper">
        <img id="lightbox-img" src="" alt="放大查看" draggable="false">
    </div>
    <div class="lightbox-controls" id="lightbox-controls">
        <button class="lightbox-btn" id="lightbox-true-size-btn" style="background:#52c41a;">100%</button>
        <button class="lightbox-btn" id="lightbox-reset-btn">自适应</button>
        <button class="lightbox-btn" id="lightbox-download-btn">保存</button>
        <button class="lightbox-btn paint-btn" id="lightbox-paint-btn">🎨 涂鸦</button>
        <button class="lightbox-btn close-btn" id="lightbox-close-btn">❌</button>
    </div>
</div>

<div id="paint-container">
    <div class="toolbar-top">
        <div class="toolbar-group">
            <span class="toolbar-label">工具:</span>
            <select id="paint-tool" class="tool-select">
                <option value="brush">🖌️ 画笔</option>
                <option value="rect">⬜ 矩形</option>
                <option value="circle">⭕ 圆形</option>
                <option value="text">🔤 文字</option>
            </select>
        </div>
        <div class="toolbar-group">
            <span class="toolbar-label">色彩:</span>
            <input type="color" id="paint-color" class="tool-color" value="#ff4d4f">
        </div>
        <div class="toolbar-group">
            <span class="toolbar-label">粗细:</span>
            <input type="range" id="paint-size" class="tool-range" min="3" max="40" value="6">
            <span id="size-val" style="font-size:11px; color:#fff; font-family:monospace; min-width:14px;">6px</span>
        </div>
        <div class="toolbar-group">
            <button id="paint-undo-btn" class="history-btn" disabled>↩️</button>
            <button id="paint-redo-btn" class="history-btn" disabled>↪️</button>
        </div>
    </div>
    
    <div id="paint-canvas-viewport">
        <canvas id="paint-canvas"></canvas>
    </div>
    
    <div class="lightbox-controls">
        <button class="lightbox-btn close-btn" id="paint-reset-cam-btn">🎯 居中</button>
        <button class="lightbox-btn" style="background:#2f54eb;" id="paint-save-local-btn">保存修改</button>
        <button class="lightbox-btn paint-btn" id="paint-send-btn">一键发送</button>
        <button class="lightbox-btn close-btn" id="paint-exit-btn">❌</button>
    </div>
</div>

<script src="js/webrtc.js"></script>
<script src="js/paint.js"></script>
</body>
</html>
